<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>PC Builder Career Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --bg-secondary: #131921;
            --bg-tertiary: #1a2230;
            --fg: #e8eef5;
            --muted: #6b7a8f;
            --accent: #00d4aa;
            --accent-dim: #00a888;
            --warning: #ffaa00;
            --danger: #ff4757;
            --success: #00d4aa;
            --card: #151c27;
            --border: #2a3544;
            --glow: rgba(0, 212, 170, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-display {
            font-family: 'Orbitron', monospace;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-dim);
        }

        /* Background Pattern */
        .bg-grid {
            background-image: 
                linear-gradient(rgba(0, 212, 170, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 170, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Glow Effects */
        .glow-accent {
            box-shadow: 0 0 20px var(--glow), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .glow-text {
            text-shadow: 0 0 20px var(--glow);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes progressBar {
            from { width: 0%; }
            to { width: var(--progress); }
        }

        .animate-fade {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .animate-slide {
            animation: slideIn 0.3s ease-out forwards;
        }

        .animate-pulse-slow {
            animation: pulse 2s infinite;
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Button Styles */
        .btn {
            position: relative;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
            color: var(--bg);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--glow);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--fg);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            background: var(--card);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #cc3344 100%);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Card Styles */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--accent-dim);
            transform: translateY(-2px);
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--fg);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(0, 212, 170, 0.1) 0%, transparent 100%);
            color: var(--accent);
            border-left-color: var(--accent);
        }

        /* Progress Bar */
        .progress-bar {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-dim) 100%);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* Component Slot */
        .component-slot {
            background: var(--bg-tertiary);
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 16px;
            min-height: 80px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .component-slot:hover {
            border-color: var(--accent);
            background: var(--card);
        }

        .component-slot.filled {
            border-style: solid;
            border-color: var(--accent-dim);
        }

        /* Stats Badge */
        .stat-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Tooltip */
        .tooltip {
            position: relative;
        }

        .tooltip-content {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .tooltip:hover .tooltip-content {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-12px);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 90%;
            max-height: 90vh;
            overflow: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        /* Benchmark Animation */
        .benchmark-bar {
            height: 24px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .benchmark-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, #00ff88 100%);
            transition: width 1s ease-out;
        }

        .benchmark-score {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 700;
            font-size: 13px;
        }

        /* Temperature Gauge */
        .temp-gauge {
            width: 100%;
            height: 12px;
            background: linear-gradient(90deg, #00d4aa 0%, #ffaa00 50%, #ff4757 100%);
            border-radius: 6px;
            position: relative;
        }

        .temp-indicator {
            position: absolute;
            top: -4px;
            width: 20px;
            height: 20px;
            background: var(--fg);
            border-radius: 50%;
            border: 3px solid var(--bg);
            transform: translateX(-50%);
            transition: left 0.5s ease;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            z-index: 2000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-left: 4px solid var(--success);
        }

        .notification.error {
            border-left: 4px solid var(--danger);
        }

        .notification.warning {
            border-left: 4px solid var(--warning);
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                width: 280px;
                z-index: 100;
                transition: left 0.3s ease;
            }

            .sidebar.open {
                left: 0;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .sidebar-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 99;
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
            }

            .sidebar-overlay.active {
                opacity: 1;
                visibility: visible;
            }
        }

        /* Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        /* Shop Level Badge */
        .level-badge {
            background: linear-gradient(135deg, var(--accent) 0%, #00ff88 100%);
            color: var(--bg);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Component quality colors */
        .quality-low { color: #888; }
        .quality-mid { color: var(--accent); }
        .quality-high { color: #ffaa00; }
        .quality-legendary { color: #ff4757; }

        /* Diagnosis animation */
        .diagnosis-pulse {
            animation: pulse 1s infinite;
        }

        /* Tabs */
        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .tab-btn:hover {
            color: var(--fg);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
    </style>
</head>

        // Initialize market prices and inventory
        function initializeGameState() {
            // Set initial market prices
            Object.keys(COMPONENTS_DB).forEach(type => {
                gameState.marketPrices[type] = {};
                COMPONENTS_DB[type].forEach(comp => {
                    gameState.marketPrices[type][comp.id] = comp.price;
                });
            });

            // Set initial inventory
            gameState.inventory = {
                cpu: [{ ...COMPONENTS_DB.cpu[0], quantity: 2 }],
                motherboard: [{ ...COMPONENTS_DB.motherboard[0], quantity: 2 }],
                ram: [{ ...COMPONENTS_DB.ram[0], quantity: 4 }],
                storage: [{ ...COMPONENTS_DB.storage[0], quantity: 2 }],
                psu: [{ ...COMPONENTS_DB.psu[0], quantity: 2 }],
                gpu: [{ ...COMPONENTS_DB.gpu[0], quantity: 1 }],
                cooler: [{ ...COMPONENTS_DB.cooler[0], quantity: 2 }],
                case: [{ ...COMPONENTS_DB.case[0], quantity: 2 }]
            };

            // Generate initial customers
            generateCustomers();
        }

        // ==========================================
        // GAME MECHANICS
        // ==========================================

        function generateCustomers() {
            gameState.customers = [];
            const numCustomers = 3 + Math.floor(gameState.shopLevel * 1.5);
            
            for (let i = 0; i < numCustomers; i++) {
                const issue = DIAGNOSIS_ISSUES[Math.floor(Math.random() * DIAGNOSIS_ISSUES.length)];
                const baseReward = 200000 + (issue.difficulty * 100000);
                const reward = Math.floor(baseReward * (1 + gameState.reputation * 0.01));
                
                gameState.customers.push({
                    id: 'cust_' + Date.now() + '_' + i,
                    name: generateCustomerName(),
                    issue: issue,
                    reward: reward,
                    deadline: 3 + Math.floor(Math.random() * 3),
                    satisfied: false
                });
            }
        }

        function generateCustomerName() {
            const firstNames = ['Budi', 'Andi', 'Siti', 'Dewi', 'Rudi', 'Wati', 'Agus', 'Sri', 'Doni', 'Maya', 'Rizki', 'Putri', 'Ahmad', 'Fatimah', 'Hendra'];
            const lastNames = ['Santoso', 'Wijaya', 'Kusuma', 'Pratama', 'Sari', 'Hidayat', 'Nugraha', 'Putra', 'Wibowo', 'Setiawan'];
            return firstNames[Math.floor(Math.random() * firstNames.length)] + ' ' + lastNames[Math.floor(Math.random() * lastNames.length)];
        }

        function addXP(skill, amount) {
            const xpNeeded = 100 * gameState.skills[skill];
            gameState.skillXP[skill] += amount;
            
            if (gameState.skillXP[skill] >= xpNeeded) {
                gameState.skillXP[skill] -= xpNeeded;
                gameState.skills[skill]++;
                showNotification(`Skill ${skill} naik ke level ${gameState.skills[skill]}!`, 'success');
            }
        }

        function updateMarketPrices() {
            Object.keys(COMPONENTS_DB).forEach(type => {
                COMPONENTS_DB[type].forEach(comp => {
                    const basePrice = comp.price;
                    const variation = (Math.random() - 0.5) * 0.2; // -10% to +10%
                    const discount = Math.random() < 0.1 ? 0.8 : 1; // 10% chance of 20% discount
                    gameState.marketPrices[type][comp.id] = Math.floor(basePrice * (1 + variation) * discount);
                });
            });
        }

        function getTotalInventoryCount() {
            let total = 0;
            Object.values(gameState.inventory).forEach(items => {
                items.forEach(item => {
                    total += item.quantity || 0;
                });
            });
            return total;
        }

        function canAfford(amount) {
            return gameState.money >= amount;
        }

        function spendMoney(amount) {
            if (canAfford(amount)) {
                gameState.money -= amount;
                return true;
            }
            return false;
        }

        function earnMoney(amount) {
            gameState.money += amount;
            gameState.totalEarnings += amount;
        }

        function nextDay() {
            gameState.day++;
            
            // Pay rent
            const rent = SHOP_LEVELS[gameState.shopLevel].dailyRent;
            if (rent > 0) {
                spendMoney(rent);
                showNotification(`Membayar sewa harian: Rp ${rent.toLocaleString('id-ID')}`, 'warning');
            }
            
            // Employee salaries
            let totalSalary = 0;
            gameState.employees.forEach(emp => {
                totalSalary += emp.salary;
            });
            if (totalSalary > 0) {
                spendMoney(totalSalary);
                showNotification(`Membayar gaji karyawan: Rp ${totalSalary.toLocaleString('id-ID')}`, 'warning');
            }
            
            // Update market prices
            updateMarketPrices();
            
            // Regenerate customers
            generateCustomers();
            
            // Random events
            if (Math.random() < 0.1) {
                const bonus = Math.floor(Math.random() * 500000) + 100000;
                earnMoney(bonus);
                showNotification(`Bonus pelanggan puas: Rp ${bonus.toLocaleString('id-ID')}`, 'success');
            }
            
            saveGame();
            renderCurrentPage();
        }

        function showNotification(message, type = 'success') {
            const notif = document.getElementById('notification');
            const text = document.getElementById('notificationText');
            
            text.textContent = message;
            notif.className = 'notification ' + type;
            notif.classList.add('show');
            
            setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }

        function showModal(content) {
            const overlay = document.getElementById('modalOverlay');
            const modal = document.getElementById('modalContent');
            modal.innerHTML = content;
            overlay.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function navigateTo(page) {
            // Update nav items
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.page === page) {
                    item.classList.add('active');
                }
            });
            
            // Close mobile sidebar
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
            
            // Render page
            renderPage(page);
        }

        function renderCurrentPage() {
            const activeNav = document.querySelector('.nav-item.active');
            if (activeNav) {
                renderPage(activeNav.dataset.page);
            }
        }

        function renderPage(page) {
            const content = document.getElementById('pageContent');
            
            switch(page) {
                case 'dashboard':
                    content.innerHTML = renderDashboard();
                    break;
                case 'workshop':
                    content.innerHTML = renderWorkshop();
                    break;
                case 'diagnosis':
                    content.innerHTML = renderDiagnosis();
                    break;
                case 'benchmark':
                    content.innerHTML = renderBenchmark();
                    break;
                case 'inventory':
                    content.innerHTML = renderInventory();
                    break;
                case 'marketplace':
                    content.innerHTML = renderMarketplace();
                    break;
                case 'shop':
                    content.innerHTML = renderShop();
                    break;
                case 'skills':
                    content.innerHTML = renderSkills();
                    break;
                case 'manual':
                    content.innerHTML = renderManual();
                    break;
                default:
                    content.innerHTML = renderDashboard();
            }
            
            // Animate page entrance
            content.classList.remove('animate-fade');
            void content.offsetWidth; // Trigger reflow
            content.classList.add('animate-fade');
        }

        function renderCompatibilityCheck(build) {
            const issues = [];
            
            // Check CPU-Motherboard socket
            if (build.cpu && build.motherboard) {
                if (build.cpu.socket !== build.motherboard.socket) {
                    issues.push({
                        type: 'error',
                        message: `Socket tidak cocok! CPU ${build.cpu.socket} vs Motherboard ${build.motherboard.socket}`
                    });
                }
            }
            
            // Check PSU wattage
            const totalPower = calculateTotalPower(build);
            if (build.psu && totalPower > build.psu.wattage) {
                issues.push({
                    type: 'error',
                    message: `PSU tidak cukup! Butuh ${totalPower}W, PSU hanya ${build.psu.wattage}W`
                });
            }
            
            // Check RAM type
            if (build.ram && build.motherboard) {
                // Simplified check - in real game would check MB RAM support
            }
            
            // Check cooler TDP
            if (build.cpu && build.cooler) {
                if (build.cpu.power > build.cooler.tdp) {
                    issues.push({
                        type: 'warning',
                        message: `Cooler mungkin kurang powerful untuk CPU ini (TDP ${build.cooler.tdp}W vs ${build.cpu.power}W)`
                    });
                }
            }

            if (issues.length === 0 && Object.values(build).some(v => v !== null)) {
                return `
                    <div class="flex items-center gap-3 text-[var(--success)]">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        <span>Semua komponen kompatibel!</span>
                    </div>
                `;
            } else if (issues.length === 0) {
                return `<p class="text-[var(--muted)]">Pilih komponen untuk melihat kompatibilitas</p>`;
            }

            return issues.map(issue => `
                <div class="flex items-start gap-3 ${issue.type === 'error' ? 'text-[var(--danger)]' : 'text-[var(--warning)]'}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span class="text-sm">${issue.message}</span>
                </div>
            `).join('');
        }

        function toggleManualSection(button) {
            const content = button.nextElementSibling;
            const icon = button.querySelector('svg');
            
            content.classList.toggle('hidden');
            icon.style.transform = content.classList.contains('hidden') ? '' : 'rotate(180deg)';
        }

        // ==========================================
        // GAME ACTIONS
        // ==========================================

        function selectComponent(type) {
            const inventory = gameState.inventory[type] || [];
            
            if (inventory.length === 0) {
                showNotification('Tidak ada komponen di inventori!', 'error');
                return;
            }

            const content = `
                <div class="p-6">
                    <h2 class="font-display text-xl font-bold mb-4">Pilih ${COMPONENT_TYPES[type]}</h2>
                    <div class="space-y-3 max-h-96 overflow-y-auto">
                        ${inventory.map((item, idx) => `
                            <div class="bg-[var(--bg-tertiary)] rounded-lg p-4 cursor-pointer hover:border-[var(--accent)] border border-transparent transition-all" onclick="installComponent('${type}', ${idx})">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="font-medium">${item.name}</p>
                                        <p class="text-sm text-[var(--muted)]">${item.brand}</p>
                                    </div>
                                    <span class="quality-${item.quality} text-xs font-bold">${item.quality.toUpperCase()}</span>
                                </div>
                                <div class="flex gap-2 mt-2">
                                    <span class="stat-badge text-xs">Perf: ${item.performance}</span>
                                    ${item.socket ? `<span class="stat-badge text-xs">${item.socket}</span>` : ''}
                                    ${item.power ? `<span class="stat-badge text-xs">${item.power}W</span>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-secondary w-full mt-4" onclick="closeModal()">Batal</button>
                </div>
            `;
            
            showModal(content);
        }

        function installComponent(type, idx) {
            const inventory = gameState.inventory[type];
            if (!inventory || !inventory[idx]) return;
            
            // Return previously installed component if any
            if (gameState.currentBuild[type]) {
                addToInventory(type, gameState.currentBuild[type]);
            }
            
            // Install new component
            gameState.currentBuild[type] = { ...inventory[idx] };
            
            // Remove from inventory
            if (inventory[idx].quantity > 1) {
                inventory[idx].quantity--;
            } else {
                inventory.splice(idx, 1);
            }
            
            addXP('assembly', 10);
            closeModal();
            renderCurrentPage();
        }

        function addToInventory(type, component) {
            const inventory = gameState.inventory[type] || [];
            const existing = inventory.find(i => i.id === component.id);
            
            if (existing) {
                existing.quantity++;
            } else {
                inventory.push({ ...component, quantity: 1 });
            }
            
            gameState.inventory[type] = inventory;
        }

        function clearBuild() {
            // Return all components to inventory
            Object.keys(gameState.currentBuild).forEach(type => {
                if (gameState.currentBuild[type]) {
                    addToInventory(type, gameState.currentBuild[type]);
                    gameState.currentBuild[type] = null;
                }
            });
            
            renderCurrentPage();
            showNotification('Build telah direset', 'warning');
        }

        function isBuildComplete() {
            return Object.values(gameState.currentBuild).every(v => v !== null);
        }

        function calculateTotalPerformance(build) {
            let total = 0;
            Object.values(build).forEach(comp => {
                if (comp) total += comp.performance || 0;
            });
            return Math.floor(total / 8);
        }

        function calculateTotalPower(build) {
            let total = 50; // Base system power
            Object.values(build).forEach(comp => {
                if (comp && comp.power) total += comp.power;
            });
            return total;
        }

        function calculateBuildPrice(build) {
            let total = 0;
            Object.values(build).forEach(comp => {
                if (comp) total += comp.price || 0;
            });
            // Add assembly fee
            total = Math.floor(total * 1.2);
            return total;
        }

        function completeBuild() {
            if (!isBuildComplete()) {
                showNotification('Lengkapi semua komponen terlebih dahulu!', 'error');
                return;
            }

            // Check compatibility issues
            const build = gameState.currentBuild;
            let hasErrors = false;

            if (build.cpu && build.motherboard && build.cpu.socket !== build.motherboard.socket) {
                hasErrors = true;
            }

            const totalPower = calculateTotalPower(build);
            if (build.psu && totalPower > build.psu.wattage) {
                hasErrors = true;
            }

            if (hasErrors) {
                showNotification('Ada masalah kompatibilitas! Periksa kembali build Anda.', 'error');
                return;
            }

            const price = calculateBuildPrice(build);
            const bonus = Math.floor(price * 0.1 * (1 + gameState.skills.assembly * 0.05));
            
            earnMoney(price + bonus);
            gameState.completedJobs++;
            gameState.reputation += 5;
            addXP('assembly', 50);
            addXP('sales', 30);

            // Clear build
            Object.keys(gameState.currentBuild).forEach(type => {
                gameState.currentBuild[type] = null;
            });

            showNotification(`PC terjual! +Rp ${(price + bonus).toLocaleString('id-ID')}`, 'success');
            renderCurrentPage();
        }

        function startDiagnosis(customerId) {
            const customer = gameState.customers.find(c => c.id === customerId);
            if (!customer) return;

            const content = `
                <div class="p-6">
                    <h2 class="font-display text-xl font-bold mb-4">Diagnosa: ${customer.name}</h2>
                    
                    <div class="bg-[var(--bg-tertiary)] rounded-lg p-4 mb-4">
                        <h3 class="font-medium mb-2">Gejala yang dilaporkan:</h3>
                        <ul class="text-sm text-[var(--muted)] space-y-1">
                            ${customer.issue.symptoms.map(s => `<li>- ${s}</li>`).join('')}
                        </ul>
                    </div>
                    
                    <div class="mb-4">
                        <h3 class="font-medium mb-2">Pilih diagnosa:</h3>
                        <div class="space-y-2">
                            ${['psu', 'motherboard', 'ram', 'gpu', 'cpu', 'storage', 'cooler'].map(cause => `
                                <button class="w-full bg-[var(--bg-tertiary)] hover:bg-[var(--card)] border border-[var(--border)] hover:border-[var(--accent)] rounded-lg p-3 text-left transition-all" onclick="performDiagnosis('${customerId}', '${cause}')">
                                    <span class="capitalize">${COMPONENT_TYPES[cause] || cause}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="flex justify-between text-sm">
                        <span class="text-[var(--muted)]">Reward: <span class="text-[var(--accent)]">Rp ${customer.reward.toLocaleString('id-ID')}</span></span>
                        <span class="text-[var(--muted)]">Deadline: ${customer.deadline} hari</span>
                    </div>
                    
                    <button class="btn btn-secondary w-full mt-4" onclick="closeModal()">Batal</button>
                </div>
            `;
            
            showModal(content);
        }

        function performDiagnosis(customerId, diagnosis) {
            const customer = gameState.customers.find(c => c.id === customerId);
            if (!customer) return;

            const correctCauses = customer.issue.possibleCauses;
            const isCorrect = correctCauses.includes(diagnosis);
            
            let reward = customer.reward;
            if (!isCorrect) {
                reward = Math.floor(reward * 0.5);
                showNotification('Diagnosa kurang tepat. Reward dikurangi 50%', 'warning');
            } else {
                showNotification('Diagnosa tepat!', 'success');
            }

            // Apply skill bonus
            const skillBonus = 1 + (gameState.skills.repair * 0.1);
            reward = Math.floor(reward * skillBonus);

            earnMoney(reward);
            gameState.completedJobs++;
            gameState.reputation += isCorrect ? 3 : 1;
            addXP('repair', isCorrect ? 30 : 10);

            // Remove customer
            const idx = gameState.customers.findIndex(c => c.id === customerId);
            if (idx > -1) gameState.customers.splice(idx, 1);

            closeModal();
            renderCurrentPage();
        }

        function runBenchmark() {
            const build = gameState.currentBuild;
            const hasComponents = Object.values(build).some(v => v !== null);
            
            if (!hasComponents) {
                showNotification('Tidak ada komponen untuk di-benchmark!', 'error');
                return;
            }

            // Calculate scores
            const cpuScore = build.cpu ? build.cpu.performance * 10 : 0;
            const gpuScore = build.gpu ? build.gpu.performance * 10 : 0;
            const ramScore = build.ram ? build.ram.performance * 8 : 0;
            const storageScore = build.storage ? build.storage.performance * 6 : 0;
            
            const gpuPerf = build.gpu ? build.gpu.performance : 10;
            const fps1080 = Math.floor(gpuPerf * 1.44);
            const fps1440 = Math.floor(gpuPerf * 0.95);
            const fps4k = Math.floor(gpuPerf * 0.48);

            let temp = 45;
            if (build.cpu) temp += build.cpu.power / 10;
            if (build.cooler) temp -= build.cooler.performance / 10;
            temp = Math.max(30, Math.min(90, temp));

            // Animate results
            setTimeout(() => {
                document.getElementById('cpuScore').textContent = cpuScore;
                document.getElementById('cpuBar').style.width = cpuScore + '%';
            }, 200);
            
            setTimeout(() => {
                document.getElementById('gpuScore').textContent = gpuScore;
                document.getElementById('gpuBar').style.width = gpuScore + '%';
            }, 400);
            
            setTimeout(() => {
                document.getElementById('ramScore').textContent = ramScore;
                document.getElementById('ramBar').style.width = ramScore + '%';
            }, 600);
            
            setTimeout(() => {
                document.getElementById('storageScore').textContent = storageScore;
                document.getElementById('storageBar').style.width = storageScore + '%';
            }, 800);
            
            setTimeout(() => {
                document.getElementById('fps1080').textContent = fps1080 + ' FPS';
                document.getElementById('fps1440').textContent = fps1440 + ' FPS';
                document.getElementById('fps4k').textContent = fps4k + ' FPS';
            }, 1000);
            
            setTimeout(() => {
                document.getElementById('tempValue').textContent = temp + 'C';
                document.getElementById('tempIndicator').style.left = temp + '%';
            }, 1200);

            addXP('assembly', 5);
        }

        function switchMarketTab(type) {
            document.querySelectorAll('#marketTabs .tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.trim() === COMPONENT_TYPES[type]) {
                    btn.classList.add('active');
                }
            });
            
            document.getElementById('marketProducts').innerHTML = renderMarketProducts(type);
        }

        function buyComponent(type, id) {
            const price = gameState.marketPrices[type][id];
            const component = COMPONENTS_DB[type].find(c => c.id === id);
            
            if (!canAfford(price)) {
                showNotification('Uang tidak cukup!', 'error');
                return;
            }

            const shopInfo = SHOP_LEVELS[gameState.shopLevel];
            if (getTotalInventoryCount() >= shopInfo.maxComponents) {
                showNotification('Inventori penuh!', 'error');
                return;
            }

            spendMoney(price);
            addToInventory(type, component);
            addXP('management', 5);
            
            showNotification(`${component.name} berhasil dibeli!`, 'success');
            renderCurrentPage();
        }

        function sellComponent(type, idx) {
            const inventory = gameState.inventory[type];
            if (!inventory || !inventory[idx]) return;
            
            const item = inventory[idx];
            const sellPrice = Math.floor(item.price * 0.7 * (1 + gameState.skills.sales * 0.05));
            
            earnMoney(sellPrice);
            addXP('sales', 10);
            
            if (item.quantity > 1) {
                item.quantity--;
            } else {
                inventory.splice(idx, 1);
            }
            
            showNotification(`${item.name} terjual! +Rp ${sellPrice.toLocaleString('id-ID')}`, 'success');
            renderCurrentPage();
        }

        function upgradeShop() {
            const nextLevel = SHOP_LEVELS[gameState.shopLevel + 1];
            if (!nextLevel) return;
            
            const cost = (gameState.shopLevel + 1) * 5000000;
            
            if (!canAfford(cost)) {
                showNotification('Uang tidak cukup untuk upgrade!', 'error');
                return;
            }
            
            spendMoney(cost);
            gameState.shopLevel++;
            addXP('management', 100);
            
            showNotification(`Toko upgraded ke ${nextLevel.name}!`, 'success');
            renderCurrentPage();
        }

        function hireEmployee() {
            const names = ['Budi', 'Andi', 'Siti', 'Dewi', 'Rudi', 'Wati', 'Agus', 'Sri'];
            const skills = ['Junior', 'Mid-level', 'Senior'];
            
            const skillIdx = Math.floor(Math.random() * 3);
            const salary = (skillIdx + 1) * 100000;
            
            const employee = {
                name: names[Math.floor(Math.random() * names.length)],
                skill: skills[skillIdx],
                salary: salary
            };
            
            gameState.employees.push(employee);
            addXP('management', 20);
            
            showNotification(`${employee.name} (${employee.skill}) direkrut!`, 'success');
            renderCurrentPage();
        }

        function fireEmployee(idx) {
            const emp = gameState.employees[idx];
            gameState.employees.splice(idx, 1);
            showNotification(`${emp.name} diberhentikan`, 'warning');
            renderCurrentPage();
        }

        // ==========================================
        // SAVE/LOAD
        // ==========================================

        function saveGame() {
            localStorage.setItem('pcBuilderSave', JSON.stringify(gameState));
            showNotification('Game berhasil disimpan!', 'success');
        }

        function loadGame() {
            const saved = localStorage.getItem('pcBuilderSave');
            if (saved) {
                const parsed = JSON.parse(saved);
                gameState = { ...gameState, ...parsed };
                
                // Ensure inventory structure
                if (!gameState.inventory || Object.keys(gameState.inventory).length === 0) {
                    initializeGameState();
                }
                
                // Generate customers if none
                if (!gameState.customers || gameState.customers.length === 0) {
                    generateCustomers();
                }
            } else {
                initializeGameState();
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================

        function init() {
            loadGame();
            
            // Close modal on overlay click
            document.getElementById('modalOverlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });

            // Auto-save every 30 seconds
            setInterval(saveGame, 30000);

            // Render initial page
            renderPage('dashboard');

            // Responsive sidebar
            const mediaQuery = window.matchMedia('(max-width: 768px)');
            function handleMediaChange(e) {
                if (!e.matches) {
                    document.getElementById('sidebar').classList.remove('open');
                    document.getElementById('sidebarOverlay').classList.remove('active');
                }
            }
            mediaQuery.addEventListener('change', handleMediaChange);
        }

        // Start game
        init();
    </script>
</body>
</html>
